  For TV: STREAM_SOURCES.tv[TMDB_ID][season][episode] = [{ name, type, url }]
*/

async function api(path){const j=path.includes('?')?'&':'?';const r=await fetch(`${TMDB}${path}${j}api_key=${TMDB_KEY}`);if(!r.ok)throw new Error('TMDB failed');return r.json()}
function img(p,size='w342'){return p?`${IMG}${size}${p}`:'https://placehold.co/342x513/151827/8b93a7?text=No+Image'}
function bg(p){return p?`${IMG}original${p}`:'https://placehold.co/1600x900/080910/8b93a7?text=StreamHub'}
function titleOf(x){return x.title||x.name||'Untitled'}function yearOf(x){return (x.release_date||x.first_air_date||'').slice(0,4)||'—'}

function getCustomSources(){
  const id=String(details.id);
  if(mediaType==='tv'){
    return STREAM_SOURCES.tv[id]?.[season]?.[episode] || STREAM_SOURCES.tv.default?.[season]?.[episode] || [];
  }
  return STREAM_SOURCES.movie[id] || STREAM_SOURCES.movie.default || [];
}

// Build the full flat list of all servers for the current cat
function buildServerList() {
  const id = String(details.id);
  const list = [];

  // Embed servers filtered by activeCat
  if (activeCat !== '_custom' && activeCat !== '_trailer') {
    EMBED_SERVERS.filter(s => s.cat === activeCat).forEach(srv => {
      list.push({
        name: srv.name,
        type: 'iframe',
        rec: !!srv.rec,
        dotClass: srv.dotClass || 'dot',
        url: srv.buildUrl(id, mediaType, season, episode)
      });
    });
  }

  // Custom sources
  if (activeCat === '_custom') {
    getCustomSources().forEach(s => list.push({ ...s, dotClass: 'dot' }));
  }

  // Trailer
  if (activeCat === '_trailer' && trailerKey) {
    list.push({
      name: 'YouTube Trailer', type: 'youtube', dotClass: 'dot-muted',
      url: `https://www.youtube.com/embed/${trailerKey}?autoplay=1&rel=0&modestbranding=1`
    });
  }

  return list;
}

function renderCatTabs() {
  const hasCats = new Set(EMBED_SERVERS.map(s => s.cat));
  document.getElementById('srvTabs').innerHTML = CATS.map(c => {
    const hidden = (c.id === '_custom' && getCustomSources().length === 0) ||
                   (c.id === '_trailer' && !trailerKey) ||
                   (!hasCats.has(c.id) && c.id !== '_custom' && c.id !== '_trailer');
    if (hidden) return '';
    return `<button class="srv-tab ${activeCat===c.id?'active':''}" onclick="selectCat('${c.id}')">${c.label}</button>`;
  }).join('');
}

function renderServers() {
  const list = buildServerList();
  if (!list.length) {
    document.getElementById('serverButtons').innerHTML = '<div class="empty">No servers in this category.</div>';
    return;
  }
  document.getElementById('serverButtons').innerHTML = list.map((s, i) =>
    `<button class="srv ${i===activeServer?'active':''}" onclick="selectServer(${i})">
      <span class="${s.dotClass||'dot'}"></span>${s.name}${s.rec?'<span class="badge-rec">REC</span>':''}
    </button>`
  ).join('');
}

function selectCat(cat) {
  activeCat = cat; activeServer = 0;
  renderCatTabs(); renderServers();
  const list = buildServerList();
  if (list.length) loadPlayer(list[0]);
  else document.getElementById('screen').innerHTML = '<div class="notice">No servers in this category.</div>';
}

function selectServer(i) {
  activeServer = i; renderServers();
  const list = buildServerList();
  loadPlayer(list[i]);
}

function loadPlayer(src) {
  const screen = document.getElementById('screen');
  if (hls) { hls.destroy(); hls = null; }
  if (!src) { screen.innerHTML = '<div class="notice">No playable source.</div>'; return; }
  document.getElementById('nowPlaying').textContent = `Now Playing • ${src.name}`;
  if (src.type === 'youtube' || src.type === 'iframe') {
    screen.innerHTML = `<iframe src="${src.url}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen referrerpolicy="no-referrer"></iframe>`;
  } else {
    screen.innerHTML = '<video id="video" controls playsinline crossorigin="anonymous"></video>';
    const v = document.getElementById('video');
    if (src.type === 'hls' && Hls.isSupported()) { hls = new Hls(); hls.loadSource(src.url); hls.attachMedia(v); }
    else { v.src = src.url; }
    v.play().catch(() => {});
  }
}

function renderEpisodes(){
  if(mediaType!=='tv'){document.getElementById('episodeBlock').innerHTML='';return}
  const totalSeasons=details.number_of_seasons||1;
  const episodeCount=(details.seasons?.find(s=>s.season_number===season)?.episode_count)||12;
  document.getElementById('episodeBlock').innerHTML=`<div class="label">Episodes</div><div class="episode-tools"><select onchange="season=Number(this.value);episode=1;activeServer=0;renderEpisodes();renderCatTabs();renderServers();selectServer(0)">${Array.from({length:totalSeasons},(_,i)=>`<option value="${i+1}" ${season===i+1?'selected':''}>Season ${i+1}</option>`).join('')}</select></div><div class="episodes">${Array.from({length:episodeCount},(_,i)=>`<button class="ep ${episode===i+1?'active':''}" onclick="episode=${i+1};activeServer=0;renderEpisodes();renderCatTabs();renderServers();selectServer(0)">E${i+1}</button>`).join('')}</div>`;
}

function openTrailer(){if(!trailerKey)return;document.getElementById('modalContent').innerHTML=`<iframe src="https://www.youtube.com/embed/${trailerKey}?autoplay=1&rel=0&modestbranding=1" allow="autoplay; fullscreen" allowfullscreen></iframe>`;document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show');document.getElementById('modalContent').innerHTML=''}
function simCard(x){const mt=mediaType;return `<div class="sim" onclick="location.href='watch.html?id=${x.id}&type=${mt}'"><img src="${img(x.poster_path,'w185')}"><div><strong>${titleOf(x)}</strong><span>${yearOf(x)} · ★ ${x.vote_average?x.vote_average.toFixed(1):'—'}</span></div></div>`}

async function init(){
  const p=new URLSearchParams(location.search); const id=p.get('id'); mediaType=p.get('type')||'movie'; if(!id){document.getElementById('heroInner').innerHTML='<div class="empty">No title selected.</div>';return}
  const [d,credits,videos,similar]=await Promise.all([api(`/${mediaType}/${id}?language=en-US`),api(`/${mediaType}/${id}/credits?language=en-US`),api(`/${mediaType}/${id}/videos?language=en-US`),api(`/${mediaType}/${id}/similar?language=en-US`)]);
  details=d; document.title=`${titleOf(d)} — StreamHub`;
  const yt=(videos.results||[]).find(v=>v.site==='YouTube'&&v.type==='Trailer')||(videos.results||[]).find(v=>v.site==='YouTube'); trailerKey=yt?.key||'';
  document.getElementById('heroBg').style.backgroundImage=`url(${bg(d.backdrop_path)})`;
  document.getElementById('heroInner').innerHTML=`<div class="poster"><img src="${img(d.poster_path)}" alt="${titleOf(d)}"></div><div class="info"><div class="genres">${(d.genres||[]).map(g=>`<span class="chip">${g.name}</span>`).join('')}</div><h1>${titleOf(d)}</h1><div class="meta"><span class="rating">★ ${d.vote_average?d.vote_average.toFixed(1):'—'}</span><span>${yearOf(d)}</span><span>${d.status||'HD'}</span><span>${mediaType.toUpperCase()}</span></div><p class="overview">${d.overview||'No overview available.'}</p></div>`;
  renderEpisodes(); renderCatTabs(); renderServers(); selectServer(0);
  const trailerThumb=d.backdrop_path?img(d.backdrop_path,'w780'):img(d.poster_path,'w342');
  document.getElementById('sidebar').innerHTML=`<div class="side-card"><h3>Trailer</h3>${trailerKey?`<div class="trailer" onclick="openTrailer()"><img src="${trailerThumb}"><div class="play">▶</div></div>`:'<div class="empty">No trailer found.</div>'}</div><div class="side-card"><h3>Cast</h3><div class="cast">${(credits.cast||[]).slice(0,6).map(c=>`<div class="person"><strong>${c.name}</strong><span>${c.character||'Cast'}</span></div>`).join('')||'<div class="empty">No cast data.</div>'}</div></div><div class="side-card"><h3>More Like This</h3>${(similar.results||[]).slice(0,6).map(simCard).join('')||'<div class="empty">No similar titles.</div>'}</div>`;
}
init().catch(()=>{document.getElementById('heroInner').innerHTML='<div class="empty">Could not load this title. Check your TMDB key or connection.</div>'});
</script>
</body>
</html>
