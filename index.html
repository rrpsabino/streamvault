<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamVault — Watch Free</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b12;
    --surface: #0e1420;
    --card: #131824;
    --border: #1e2636;
    --accent: #e8473f;
    --accent2: #f5a623;
    --text: #e8eaf0;
    --muted: #6b7591;
    --highlight: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px;
    height: 64px;
    background: linear-gradient(to bottom, rgba(8,11,18,0.98) 0%, rgba(8,11,18,0.7) 100%);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--highlight);
    cursor: pointer;
  }
  .logo span { color: var(--accent); }

  .nav-links { display: flex; gap: 28px; align-items: center; }
  .nav-links a {
    color: var(--muted); font-size: 14px; font-weight: 500;
    cursor: pointer; text-decoration: none; transition: color .2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--text); }

  .nav-search {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 14px;
  }
  .nav-search input {
    background: none; border: none; outline: none;
    color: var(--text); font-family: inherit; font-size: 13px; width: 200px;
  }
  .nav-search input::placeholder { color: var(--muted); }
  .nav-search svg { color: var(--muted); flex-shrink: 0; }

  /* HERO */
  #hero {
    height: 100vh; min-height: 600px; position: relative;
    display: flex; align-items: flex-end; padding-bottom: 80px;
    overflow: hidden;
  }
  #hero-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center top;
    filter: brightness(0.35);
    transition: all 0.8s ease;
  }
  .hero-gradient {
    position: absolute; inset: 0;
    background: linear-gradient(to top, var(--bg) 10%, transparent 60%, var(--bg) 100%),
                linear-gradient(to right, var(--bg) 0%, transparent 50%);
  }
  .hero-content {
    position: relative; z-index: 2;
    padding: 0 60px; max-width: 640px;
  }
  .hero-badge {
    display: inline-block; background: var(--accent);
    color: #fff; font-size: 11px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 10px; border-radius: 4px; margin-bottom: 14px;
  }
  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 6vw, 72px); line-height: 1;
    color: var(--highlight); margin-bottom: 16px;
  }
  .hero-meta {
    display: flex; gap: 16px; align-items: center;
    font-size: 13px; color: var(--muted); margin-bottom: 16px;
  }
  .hero-meta .rating { color: var(--accent2); font-weight: 600; }
  .hero-overview {
    font-size: 14px; line-height: 1.7; color: #a0a8bf;
    margin-bottom: 28px; max-width: 480px;
    display: -webkit-box; -webkit-line-clamp: 3;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .hero-btns { display: flex; gap: 12px; }
  .btn-watch {
    display: flex; align-items: center; gap: 8px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 8px;
    padding: 12px 28px; font-family: inherit;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: background .2s, transform .15s;
  }
  .btn-watch:hover { background: #c73830; transform: translateY(-1px); }
  .btn-info {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.1); color: var(--text);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
    padding: 12px 24px; font-family: inherit;
    font-size: 15px; font-weight: 500; cursor: pointer;
    transition: background .2s;
  }
  .btn-info:hover { background: rgba(255,255,255,0.18); }

  /* SECTIONS */
  main { padding-top: 0; }
  .section { padding: 40px 40px; }
  .section-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 1px; color: var(--highlight);
  }
  .see-all {
    font-size: 12px; color: var(--accent); cursor: pointer;
    text-decoration: none; font-weight: 500; letter-spacing: 0.5px;
  }

  /* FILTER TABS */
  .filter-tabs {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .filter-tab {
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); border-radius: 20px;
    padding: 6px 16px; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all .2s;
  }
  .filter-tab:hover, .filter-tab.active {
    background: var(--accent); border-color: var(--accent);
    color: #fff;
  }

  /* GRID */
  .movies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }

  .movie-card {
    position: relative; border-radius: 10px; overflow: hidden;
    background: var(--card); cursor: pointer;
    transition: transform .25s, box-shadow .25s;
    aspect-ratio: 2/3;
  }
  .movie-card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    z-index: 10;
  }
  .movie-card img {
    width: 100%; height: 100%; object-fit: cover;
    display: block;
  }
  .movie-card .card-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 50%);
    opacity: 0; transition: opacity .25s;
    display: flex; align-items: flex-end;
    padding: 12px;
  }
  .movie-card:hover .card-overlay { opacity: 1; }
  .card-play {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent); border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .movie-card .card-rating {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
    color: var(--accent2); font-size: 11px; font-weight: 700;
    padding: 2px 7px; border-radius: 4px;
  }
  .movie-card .card-title {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 10px 10px 10px;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%);
    font-size: 12px; font-weight: 500; color: var(--text);
    line-height: 1.3;
  }
  .movie-card .card-year {
    font-size: 10px; color: var(--muted); margin-top: 2px;
  }
  .card-type-badge {
    position: absolute; top: 8px; left: 8px;
    font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase; padding: 2px 6px; border-radius: 3px;
  }
  .badge-movie { background: var(--accent); color: #fff; }
  .badge-tv { background: #2e6af6; color: #fff; }

  /* SKELETON */
  .skeleton {
    background: linear-gradient(90deg, var(--card) 25%, var(--border) 50%, var(--card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 10px; aspect-ratio: 2/3;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* MODAL */
  #modal-overlay {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(0,0,0,0.88); backdrop-filter: blur(10px);
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; width: 100%; max-width: 900px;
    max-height: 90vh; overflow-y: auto; position: relative;
  }
  .modal-close {
    position: absolute; top: 16px; right: 16px; z-index: 10;
    width: 36px; height: 36px; background: rgba(255,255,255,0.1);
    border: none; border-radius: 50%; cursor: pointer; color: var(--text);
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .modal-close:hover { background: var(--accent); }
  .modal-backdrop {
    width: 100%; height: 220px; object-fit: cover;
    border-radius: 16px 16px 0 0;
    filter: brightness(0.5);
  }
  .modal-backdrop-wrap {
    position: relative; border-radius: 16px 16px 0 0; overflow: hidden;
  }
  .modal-backdrop-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, var(--surface) 0%, transparent 70%);
  }
  .modal-body { padding: 24px; }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px; color: var(--highlight); margin-bottom: 8px;
  }
  .modal-meta {
    display: flex; flex-wrap: wrap; gap: 12px;
    font-size: 13px; color: var(--muted); margin-bottom: 14px;
    align-items: center;
  }
  .modal-meta .rating { color: var(--accent2); font-weight: 700; }
  .modal-meta .genre-pill {
    background: var(--card); border: 1px solid var(--border);
    padding: 2px 10px; border-radius: 20px; font-size: 11px;
  }
  .modal-overview {
    font-size: 14px; line-height: 1.75; color: #9aa3bc;
    margin-bottom: 24px;
  }

  /* PLAYER SECTION */
  .player-wrap {
    background: #000; border-radius: 10px; overflow: hidden;
    aspect-ratio: 16/9; margin-bottom: 16px; position: relative;
  }
  #player-iframe {
    width: 100%; height: 100%; border: none; display: block;
  }
  .player-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    color: var(--muted); font-size: 14px;
  }

  /* SERVER GROUPS */
  .server-group-tabs { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .server-group-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase; margin-bottom: 7px;
  }
  .servers-row { display: flex; flex-wrap: wrap; gap: 7px; }
  .server-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px;
    padding: 7px 16px; font-family: inherit; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all .18s;
    display: flex; align-items: center; gap: 6px;
  }
  .server-btn:hover { border-color: var(--hover-color, var(--accent)); color: var(--hover-color, var(--accent)); }
  .server-btn.active { color: #fff; }
  .server-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }

  /* EPISODES for TV */
  .episodes-section { margin-top: 20px; }
  .season-select {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px;
    padding: 8px 14px; font-family: inherit; font-size: 13px;
    margin-bottom: 14px; cursor: pointer; outline: none;
  }
  .episodes-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .ep-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); border-radius: 6px;
    padding: 5px 12px; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all .2s;
  }
  .ep-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ep-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* SEARCH RESULTS */
  #search-page { display: none; padding: 100px 40px 40px; }
  #search-page.show { display: block; }
  #home-content { display: block; }
  #home-content.hide { display: none; }

  /* LOADING */
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 10px 22px; border-radius: 30px;
    font-size: 13px; z-index: 9999; opacity: 0;
    transition: opacity .3s; pointer-events: none;
  }
  #toast.show { opacity: 1; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    nav { padding: 0 16px; }
    .nav-links { display: none; }
    .nav-search input { width: 130px; }
    .hero-content { padding: 0 20px; }
    .section { padding: 30px 16px; }
    .movies-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>

<!-- HERO -->

<!-- MAIN -->
<main>

    <!-- Popular TV Shows -->

    <!-- Top Rated -->
    <div class="section">

  <!-- SEARCH PAGE -->
  <div id="search-page">

    <div class="movies-grid" id="search-grid"></div>

</main>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModalOnBg(event)">
  <div id="modal">

      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">

      </svg>

    <div id="modal-content"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const TMDB_KEY = '4ef0d7355d9ffb5151e987764708ce96';
const TMDB = 'https://api.themoviedb.org/3';
const IMG = 'https://image.tmdb.org/t/p/';

let heroMovies = [];
let heroIndex = 0;
let heroInterval;
let currentItem = null;
let currentSeason = 1;
let currentEpisode = 1;
let currentServerIndex = 0;

// Safe item store — avoids JSON-in-HTML injection issues
const CARD_STORE = {};
let CARD_ID = 0;

// SERVER GROUPS
const SERVER_GROUPS = {
  main: { label: '⚡ Main', color: '#2ecc71' },
  flowcast: { label: '🌊 FlowCast', color: '#4a9eff' },
  primevid: { label: '👑 PrimeVid', color: '#f5a623' },
  hindicast: { label: '🇮🇳 HindiCast', color: '#e8473f' },
  torrent: { label: '🧲 Torrent', color: '#9b59b6' },
};

// SERVERS per type
function getServers(item, season, episode) {
  const isTV = item.media_type === 'tv' || item.first_air_date;
  const id = item.id;
  const imdb = item.imdb_id || '';

  if (isTV) {
    return [
      // MAIN
      { name: 'VidSrc',       group: 'main',     url: `https://vidsrc.to/embed/tv/${id}/${season}/${episode}` },
      { name: 'EmbedSU',      group: 'main',     url: `https://embed.su/embed/tv/${id}/${season}/${episode}` },
      { name: 'VidSrc XYZ',   group: 'main',     url: `https://vidsrc.xyz/embed/tv?tmdb=${id}&season=${season}&episode=${episode}` },
      { name: 'VidLink',      group: 'main',     url: `https://vidlink.pro/tv/${id}/${season}/${episode}` },
      { name: 'MultiEmbed',   group: 'main',     url: `https://multiembed.mov/?video_id=${id}&tmdb=1&s=${season}&e=${episode}` },
      // FLOWCAST
      { name: 'FlowCast 1',   group: 'flowcast', url: `https://vidsrc.cc/v2/embed/tv/${id}/${season}/${episode}` },
      { name: 'FlowCast 2',   group: 'flowcast', url: `https://player.autoembed.cc/embed/tv/${id}/${season}/${episode}` },
      { name: 'FlowCast 3',   group: 'flowcast', url: `https://www.2embed.cc/embedtv/${id}&s=${season}&e=${episode}` },
      // PRIMEVID
      { name: 'PrimeVid 1',   group: 'primevid', url: `https://vidfast.pro/tv/${id}/${season}/${episode}` },
      { name: 'PrimeVid 2',   group: 'primevid', url: `https://embedder.net/e/?tmdb=${id}&season=${season}&episode=${episode}` },
      { name: 'PrimeVid 3',   group: 'primevid', url: `https://smashystream.xyz/playere.php?tmdb=${id}&s=${season}&e=${episode}` },
      // HINDICAST
      { name: 'HindiCast 1',  group: 'hindicast',url: `https://vidsrc.icu/embed/tv/${id}/${season}/${episode}` },
      { name: 'HindiCast 2',  group: 'hindicast',url: `https://moviesapi.club/tv/${id}-${season}-${episode}` },
      { name: 'HindiCast 3',  group: 'hindicast',url: `https://multiembed.mov/directstream.php?video_id=${id}&tmdb=1&s=${season}&e=${episode}` },
      // TORRENT
      { name: 'Torrent 1',    group: 'torrent',  url: `https://dl.vidsrc.vip/tv/${id}/${season}/${episode}` },
      { name: 'Torrent 2',    group: 'torrent',  url: `https://vidsrc.me/embed/tv?tmdb=${id}&season=${season}&episode=${episode}` },
    ];
  } else {
    return [
      // MAIN
      { name: 'VidSrc',       group: 'main',     url: `https://vidsrc.to/embed/movie/${id}` },
      { name: 'EmbedSU',      group: 'main',     url: `https://embed.su/embed/movie/${id}` },
      { name: 'VidSrc XYZ',   group: 'main',     url: `https://vidsrc.xyz/embed/movie?tmdb=${id}` },
      { name: 'VidLink',      group: 'main',     url: `https://vidlink.pro/movie/${id}` },
      { name: 'MultiEmbed',   group: 'main',     url: `https://multiembed.mov/?video_id=${id}&tmdb=1` },
      // FLOWCAST
      { name: 'FlowCast 1',   group: 'flowcast', url: `https://vidsrc.cc/v2/embed/movie/${id}` },
      { name: 'FlowCast 2',   group: 'flowcast', url: `https://player.autoembed.cc/embed/movie/${id}` },
      { name: 'FlowCast 3',   group: 'flowcast', url: `https://www.2embed.cc/embed/${id}` },
      // PRIMEVID
      { name: 'PrimeVid 1',   group: 'primevid', url: `https://vidfast.pro/movie/${id}` },
      { name: 'PrimeVid 2',   group: 'primevid', url: `https://embedder.net/e/?tmdb=${id}` },
      { name: 'PrimeVid 3',   group: 'primevid', url: `https://smashystream.xyz/playere.php?tmdb=${id}` },
      // HINDICAST
      { name: 'HindiCast 1',  group: 'hindicast',url: `https://vidsrc.icu/embed/movie/${id}` },
      { name: 'HindiCast 2',  group: 'hindicast',url: `https://moviesapi.club/movie/${id}` },
      { name: 'HindiCast 3',  group: 'hindicast',url: `https://multiembed.mov/directstream.php?video_id=${id}&tmdb=1` },
      // TORRENT
      { name: 'Torrent 1',    group: 'torrent',  url: `https://dl.vidsrc.vip/movie/${id}` },
      { name: 'Torrent 2',    group: 'torrent',  url: `https://vidsrc.me/embed/movie?tmdb=${id}` },
    ];
  }
}

async function apiFetch(endpoint) {
  const r = await fetch(`${TMDB}${endpoint}&api_key=${TMDB_KEY}`);
  return r.json();
}

function skeletons(grid, count = 12) {
  grid.innerHTML = Array(count).fill('<div class="skeleton"></div>').join('');
}

function isTV(item) {
  return item.media_type === 'tv' || item.first_air_date;
}

function cardHTML(item, type) {
  const cid = 'c' + (++CARD_ID);
  CARD_STORE[cid] = item;
  const poster = item.poster_path ? `${IMG}w300${item.poster_path}` : 'https://via.placeholder.com/300x450/131824/6b7591?text=No+Image';
  const title = item.title || item.name || 'Unknown';
  const year = (item.release_date || item.first_air_date || '').slice(0, 4);
  const rating = item.vote_average ? item.vote_average.toFixed(1) : 'N/A';
  const typeLabel = type === 'tv' ? 'TV' : 'Movie';
  const badgeClass = type === 'tv' ? 'badge-tv' : 'badge-movie';
  return `
    <div class="movie-card" onclick="openModalById('${cid}','${type}')">
      <img src="${poster}" alt="" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450/131824/6b7591?text=No+Poster'">
      <div class="card-rating">⭐ ${rating}</div>
      <span class="card-type-badge ${badgeClass}">${typeLabel}</span>
      <div class="card-overlay">
        <div class="card-play">
          <svg width="12" height="14" fill="white" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
      </div>
      <div class="card-title">
        ${title}
        <div class="card-year">${year}</div>
      </div>
    </div>`;
}

function renderGrid(grid, items, defaultType = 'movie') {
  if (!items || !items.length) { grid.innerHTML = '<p style="color:var(--muted);font-size:13px">Nothing found.</p>'; return; }
  grid.innerHTML = items.map(item => {
    const t = item.media_type || defaultType;
    return cardHTML(item, t);
  }).join('');
}

// HERO
async function loadHero() {
  const data = await apiFetch(`/trending/movie/week?`);
  heroMovies = data.results.slice(0, 6);
  showHero(0);
  heroInterval = setInterval(() => {
    heroIndex = (heroIndex + 1) % heroMovies.length;
    showHero(heroIndex);
  }, 7000);
}

function showHero(i) {
  const m = heroMovies[i];
  if (!m) return;
  CARD_STORE['hero_'+i] = m;
  const bg = m.backdrop_path ? `${IMG}original${m.backdrop_path}` : '';
  document.getElementById('hero-bg').style.backgroundImage = `url(${bg})`;
  const rating = m.vote_average ? m.vote_average.toFixed(1) : '';
  const year = (m.release_date || '').slice(0, 4);
  document.getElementById('hero-content').innerHTML = `
    <div class="hero-badge">Featured Movie</div>
    <div class="hero-title">${m.title}</div>
    <div class="hero-meta">
      <span class="rating">⭐ ${rating}</span>
      <span>${year}</span>
      <span>HD</span>
    </div>
    <div class="hero-overview">${m.overview || ''}</div>
    <div class="hero-btns">
      <button class="btn-watch" onclick="openModalById('hero_'+heroIndex,'movie')">
        <svg width="14" height="14" fill="white" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
        Watch Now
      </button>
      <button class="btn-info" onclick="openModalById('hero_'+heroIndex,'movie')">ℹ️ More Info</button>
    </div>`;
}

// TRENDING
async function loadTrending(type, btn) {
  document.querySelectorAll('#trending-tabs .filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const grid = document.getElementById('trending-grid');
  skeletons(grid);
  const endpoint = type === 'all' ? '/trending/all/week?' : `/trending/${type}/week?`;
  const data = await apiFetch(endpoint);
  renderGrid(grid, data.results.slice(0, 18));
}

async function loadMovies() {
  const grid = document.getElementById('movies-grid');
  skeletons(grid);
  const data = await apiFetch('/movie/popular?');
  renderGrid(grid, data.results.slice(0, 12), 'movie');
}

async function loadTV() {
  const grid = document.getElementById('tv-grid');
  skeletons(grid);
  const data = await apiFetch('/tv/popular?');
  renderGrid(grid, data.results.slice(0, 12), 'tv');
}

async function loadTopRated() {
  const grid = document.getElementById('toprated-grid');
  skeletons(grid);
  const data = await apiFetch('/movie/top_rated?');
  renderGrid(grid, data.results.slice(0, 12), 'movie');
}

// SEARCH
function handleSearch(e) {
  if (e.key === 'Enter') {
    const q = e.target.value.trim();
    if (!q) return;
    searchContent(q);
  }
}

async function searchContent(q) {
  document.getElementById('home-content').classList.add('hide');
  document.getElementById('search-page').classList.add('show');
  const grid = document.getElementById('search-grid');
  document.getElementById('search-title').textContent = `Results for "${q}"`;
  skeletons(grid, 18);
  const data = await apiFetch(`/search/multi?query=${encodeURIComponent(q)}&`);
  renderGrid(grid, data.results.filter(r => r.media_type !== 'person').slice(0, 24));
}

function goHome() {
  document.getElementById('home-content').classList.remove('hide');
  document.getElementById('search-page').classList.remove('show');
  document.getElementById('search-input').value = '';
}

// MODAL
function openModalById(cid, type) {
  const item = CARD_STORE[cid];
  if (!item) return;
  openModal(item, type);
}

async function openModal(item, type) {
  currentItem = item;
  currentItem.media_type = type;
  currentSeason = 1;
  currentEpisode = 1;
  currentServerIndex = 0;

  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('open');

  const mc = document.getElementById('modal-content');
  mc.innerHTML = `<div style="display:flex;justify-content:center;align-items:center;height:200px"><div class="spinner"></div></div>`;

  let details;
  try {
    const endpoint = type === 'tv' ? `/tv/${item.id}?` : `/movie/${item.id}?`;
    const data = await apiFetch(endpoint);
    details = { ...item, ...data };
  } catch {
    details = item;
  }

  const backdrop = details.backdrop_path ? `${IMG}w1280${details.backdrop_path}` : '';
  const poster = details.poster_path ? `${IMG}w342${details.poster_path}` : '';
  const title = details.title || details.name || 'Unknown';
  const year = (details.release_date || details.first_air_date || '').slice(0, 4);
  const rating = details.vote_average ? details.vote_average.toFixed(1) : 'N/A';
  const genres = (details.genres || []).map(g => `<span class="genre-pill">${g.name}</span>`).join('');
  const runtime = details.runtime ? `${details.runtime} min` : (details.episode_run_time && details.episode_run_time[0] ? `${details.episode_run_time[0]} min/ep` : '');
  const seasons = details.number_of_seasons || 0;

  const servers = getServers(details, currentSeason, currentEpisode);
  const serverBtns = buildServerUI(servers, 0);

  let episodesHTML = '';
  if (type === 'tv' && seasons > 0) {
    const seasonOptions = Array.from({length: seasons}, (_, i) =>
      `<option value="${i+1}">Season ${i+1}</option>`).join('');
    episodesHTML = `
      <div class="episodes-section">
        <div class="servers-label">Episodes</div>
        <select class="season-select" id="season-select" onchange="changeSeason(this.value)">
          ${seasonOptions}
        </select>
        <div class="episodes-grid" id="episodes-grid">
          <div class="spinner"></div>
        </div>
      </div>`;
  }

  mc.innerHTML = `
    <div class="modal-backdrop-wrap">
      <img class="modal-backdrop" src="${backdrop}" alt="" onerror="this.style.display='none'">
      <div class="modal-backdrop-overlay"></div>
    </div>
    <div class="modal-body">
      <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:18px">
        ${poster ? `<img src="${poster}" alt="" style="width:90px;border-radius:8px;flex-shrink:0">` : ''}
        <div>
          <div class="modal-title">${title}</div>
          <div class="modal-meta">
            <span class="rating">⭐ ${rating}</span>
            <span>${year}</span>
            ${runtime ? `<span>${runtime}</span>` : ''}
            ${genres}
          </div>
          <div class="modal-overview">${details.overview || 'No description available.'}</div>
        </div>
      </div>

      <div class="player-wrap">
        <iframe id="player-iframe" src="${servers[0].url}" allowfullscreen allow="autoplay; encrypted-media"></iframe>
      </div>

      <div class="servers-label">🖥️ Available Servers — If one fails, try another</div>
      <div id="servers-grid">${serverBtns}</div>
      ${episodesHTML}
    </div>`;

  if (type === 'tv' && seasons > 0) loadEpisodes(1);
}

function buildServerUI(servers, activeIndex) {
  const groups = Object.keys(SERVER_GROUPS);
  let html = `<div class="server-group-tabs">`;
  groups.forEach((g, gi) => {
    const grpServers = servers.filter(s => s.group === g);
    if (!grpServers.length) return;
    const grp = SERVER_GROUPS[g];
    html += `<div class="server-group">
      <div class="server-group-label" style="color:${grp.color}">${grp.label}</div>
      <div class="servers-row">`;
    grpServers.forEach(s => {
      const i = servers.indexOf(s);
      html += `<button class="server-btn ${i === activeIndex ? 'active' : ''}" onclick="switchServer(${i})"
        style="${i === activeIndex ? `background:${grp.color};border-color:${grp.color};color:#fff` : `--hover-color:${grp.color}`}">
        <span class="server-dot" style="background:${grp.color}"></span>${s.name}
      </button>`;
    });
    html += `</div></div>`;
  });
  html += `</div>`;
  return html;
}

function switchServer(index) {
  currentServerIndex = index;
  const servers = getServers(currentItem, currentSeason, currentEpisode);
  document.getElementById('player-iframe').src = servers[index].url;
  const grid = document.getElementById('servers-grid');
  if (grid) grid.innerHTML = buildServerUI(servers, index);
  const s = servers[index];
  const grp = SERVER_GROUPS[s.group];
  showToast(`▶ Switched to ${s.name} (${grp.label})`);
}

async function loadEpisodes(season) {
  const grid = document.getElementById('episodes-grid');
  if (!grid) return;
  grid.innerHTML = '<div class="spinner"></div>';
  try {
    const data = await apiFetch(`/tv/${currentItem.id}/season/${season}?`);
    const eps = data.episodes || [];
    grid.innerHTML = eps.map(ep => `
      <button class="ep-btn ${ep.episode_number === currentEpisode && season == currentSeason ? 'active' : ''}"
        onclick="changeEpisode(${season}, ${ep.episode_number})">
        E${ep.episode_number}
      </button>`).join('');
  } catch {
    grid.innerHTML = '<span style="color:var(--muted);font-size:12px">Could not load episodes.</span>';
  }
}

function changeSeason(season) {
  currentSeason = parseInt(season);
  currentEpisode = 1;
  loadEpisodes(currentSeason);
  updatePlayer();
}

function changeEpisode(season, episode) {
  currentSeason = season;
  currentEpisode = episode;
  document.querySelectorAll('.ep-btn').forEach((b, i) =>
    b.classList.toggle('active', false));
  event.target.classList.add('active');
  updatePlayer();
  showToast(`▶ Now playing S${season}E${episode}`);
}

function updatePlayer() {
  const servers = getServers(currentItem, currentSeason, currentEpisode);
  document.getElementById('player-iframe').src = servers[currentServerIndex].url;
  const grid = document.getElementById('servers-grid');
  if (grid) grid.innerHTML = buildServerUI(servers, currentServerIndex);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  const iframe = document.getElementById('player-iframe');
  if (iframe) iframe.src = '';
}

function closeModalOnBg(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// Filter nav
function filterByType(type, el) {
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  if (el) el.classList.add('active');
  goHome();
  if (type === 'movie') {
    document.getElementById('tv-grid').closest('.section').style.display = 'none';
    document.getElementById('movies-grid').closest('.section').style.display = '';
  } else if (type === 'tv') {
    document.getElementById('movies-grid').closest('.section').style.display = 'none';
    document.getElementById('tv-grid').closest('.section').style.display = '';
  } else {
    document.querySelectorAll('.section').forEach(s => s.style.display = '');
  }
}

function filterSection(type, el) {
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  if (el) el.classList.add('active');
  goHome();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// INIT
(async function init() {
  loadHero();
  loadTrending('all', document.querySelector('#trending-tabs .filter-tab'));
  loadMovies();
  loadTV();
  loadTopRated();
})();
</script>
</body>
